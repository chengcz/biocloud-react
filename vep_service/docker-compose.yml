# VEP Annotation Service - Docker Compose
# Standalone service, separate from backend

version: '3.8'

services:
  vep-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vep_annotation_service
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=VEP Annotation Service
      - DATABASE_URL=postgresql+asyncpg://vep_user:vep_password@postgres:5432/vep_cache
      - VEP_DATA_DIR=/data/vep_data
      - VEP_TIMEOUT=300
      - MAX_VCF_SIZE=52428800
      - DEBUG=false
    volumes:
      - ./data/vep_data:/data/vep_data:ro
      - ./app/config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vep-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: vep_postgres
    environment:
      - POSTGRES_USER=vep_user
      - POSTGRES_PASSWORD=vep_password
      - POSTGRES_DB=vep_cache
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - vep-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vep_user -d vep_cache"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  vep-network:
    driver: bridge